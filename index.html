<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <link rel="icon" type="image/png" href="/logo_brand.png" />
  <title>Bintang Mas - QR v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kaushan+Script&display=swap"
    rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Fallback: If Vite's main module fails to load (often due to stale PWA cache pointing to deleted chunks),
    // unregister the service worker and force a reload to get the fresh index.html.
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('/assets/')) {
        console.error('Script failed to load:', e.target.src, 'Unregistering SW and reloading...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for (let reg of regs) reg.unregister();
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
